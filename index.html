<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iceberg Visual: Healthcare Context</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* MANDATORY FONT: Montserrat */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #002a54;
        }

        .iceberg-container {
            height: 100vh;
            width: 100vw;
            position: relative;
            background-color: #a5d8ff;
            background-image: url('https://thesimpleaiguide-create.github.io/iceberg/iceberg.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Visible Behaviours Labels - Dark Text, High Visibility Glow */
        .label-text {
            color: #1a1a1a; 
            font-size: 1.6rem;
            font-weight: 400;
            position: absolute;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: -0.01em;
            z-index: 20;
            text-shadow: 0 0 12px rgba(255,255,255,1), 0 0 6px rgba(255,255,255,0.8);
        }

        /* Hidden Drivers Labels - White Text, Dark Shadow */
        .static-label {
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: 400;
            position: absolute;
            max-width: 450px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            letter-spacing: 0.01em;
            line-height: 1.2;
            z-index: 30;
        }

        .interactive-label {
            cursor: pointer;
            pointer-events: auto;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        
        .interactive-label:hover {
            color: #a5d8ff;
            transform: scale(1.05);
        }

        /* Detail Panel styling - Supporting Left and Right positions */
        .detail-panel {
            position: fixed;
            top: 50%;
            width: 420px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
            pointer-events: none; 
        }

        .detail-panel.on-right {
            right: 40px;
            left: auto;
            transform: translateY(-50%) translateX(20px);
            border-left: 8px solid #004b8d;
            border-right: none;
        }

        .detail-panel.on-left {
            left: 40px;
            right: auto;
            transform: translateY(-50%) translateX(-20px);
            border-right: 8px solid #004b8d;
            border-left: none;
        }

        .detail-panel.active.on-right,
        .detail-panel.active.on-left {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) translateX(0);
        }

        .detail-panel h2 {
            font-weight: 700;
            font-size: 1.4rem;
            color: #004b8d;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .detail-panel li {
            font-size: 1.1rem;
            line-height: 1.4;
            color: #1a1a1a;
            margin-bottom: 15px;
            padding-left: 25px;
            position: relative;
        }

        .detail-panel li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #004b8d;
            font-weight: bold;
            font-size: 1.4rem;
        }

        /* LOGIC: Fly-in Animation with 10s wait */
        @keyframes flyInHorizontal {
            0% { opacity: 0; transform: translateX(-100px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .animate-fly-in {
            opacity: 0;
            visibility: hidden;
        }

        /* Start sequence exactly 10s after play begins */
        body.is-playing .animate-fly-in {
            visibility: visible;
            animation: flyInHorizontal 2.5s cubic-bezier(0.25, 1, 0.5, 1) both;
        }

        /* Skip functionality for user control */
        body.skip-delay .animate-fly-in {
            animation: none !important;
            opacity: 1 !important;
            visibility: visible !important;
            transform: translateX(0) !important;
        }

        /* Start Button Overlay */
        #startOverlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 42, 84, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .start-btn {
            background-color: #a5d8ff;
            color: #002a54;
            padding: 18px 50px;
            font-size: 1.6rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        /* Bottom Controls Bar */
        #bottomControls {
            position: fixed;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        body.is-playing #bottomControls {
            opacity: 1;
            pointer-events: auto;
        }

        .control-link {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            background: none;
            border: none;
            border-bottom: 1px solid transparent;
            padding: 5px;
        }

        .control-link:hover {
            color: #ffffff;
            border-bottom: 1px solid #ffffff;
        }
    </style>
</head>
<body class="p-0 m-0">

    <audio id="narrationAudio" src="https://thesimpleaiguide-create.github.io/iceberg/updated_narrative.wav" preload="auto"></audio>

    <div id="startOverlay">
        <button class="start-btn" onclick="startExperience()">Begin Module</button>
    </div>

    <div class="iceberg-container">
        <!-- POSITIONING: Cleared peak logic applied -->
        
        <!-- Visible Behaviours (Above Water) - Contour aligned tighter to iceberg peak -->
        <div class="absolute top-[5%] left-[34%] label-text animate-fly-in" style="animation-delay: 10.0s;">Frustration</div> 
        <div class="absolute top-[5%] right-[34%] label-text animate-fly-in" style="animation-delay: 10.4s;">Manipulative</div> 
        
        <div class="absolute top-[14%] left-[26%] label-text animate-fly-in" style="animation-delay: 10.8s;">Raised Voice</div>
        <div class="absolute top-[14%] right-[26%] label-text animate-fly-in" style="animation-delay: 11.2s;">Demanding</div> 
        
        <div class="absolute top-[23%] left-[18%] label-text animate-fly-in" style="animation-delay: 11.6s;">Anger</div>
        <div class="absolute top-[23%] right-[18%] label-text animate-fly-in" style="animation-delay: 12.0s;">Invading</div>
        
        <div class="absolute top-[32%] left-[10%] label-text animate-fly-in" style="animation-delay: 12.4s;">Interrupting</div>
        <div class="absolute top-[32%] right-[10%] label-text animate-fly-in" style="animation-delay: 12.8s;">Eye rolling</div> 

        <!-- Hidden Drivers (Below Water) -->
        <div class="static-label top-[48%] left-[2%] interactive-label animate-fly-in" style="animation-delay: 13.0s;" onmouseenter="showData('unmet', 'right')" onmouseleave="hideData()">Unmet Needs</div>
        <div class="static-label top-[58%] left-[4%] interactive-label animate-fly-in" style="animation-delay: 13.3s;" onmouseenter="showData('fear', 'right')" onmouseleave="hideData()">Fear & Anxiety</div>
        <div class="static-label top-[70%] left-[6%] interactive-label animate-fly-in" style="animation-delay: 13.6s;" onmouseenter="showData('life', 'right')" onmouseleave="hideData()">Life Circumstances</div>
        <div class="static-label top-[82%] left-[8%] interactive-label animate-fly-in" style="animation-delay: 13.9s;" onmouseenter="showData('shame', 'right')" onmouseleave="hideData()">Shame & Embarrassment</div>
        
        <!-- Reordered Right Side & Replaced 'and' with '&' -->
        <div class="static-label top-[48%] right-[2%] interactive-label animate-fly-in" style="animation-delay: 14.2s;" onmouseenter="showData('feelingUnheard', 'left')" onmouseleave="hideData()">Feeling Unheard</div>
        <div class="static-label top-[58%] right-[4%] interactive-label animate-fly-in" style="animation-delay: 14.5s;" onmouseenter="showData('powerless', 'left')" onmouseleave="hideData()">Feeling Powerless</div>
        <div class="static-label top-[70%] right-[6%] interactive-label animate-fly-in" style="animation-delay: 14.8s;" onmouseenter="showData('distress', 'left')" onmouseleave="hideData()">Genuine Pain & Distress</div>
        <div class="static-label top-[82%] right-[8%] interactive-label animate-fly-in" style="animation-delay: 15.1s;" onmouseenter="showData('trauma', 'left')" onmouseleave="hideData()">Past Traumatic Experiences</div>
    </div>

    <div id="bottomControls">
        <button class="control-link" onclick="toggleMute()" id="muteToggle">Mute Audio</button>
        <button class="control-link" onclick="skipAudio()">Skip Narration</button>
    </div>

    <div id="detailPanel" class="detail-panel on-right"><h2 id="panelHeading">Heading</h2><ul id="panelList"></ul></div>

    <script>
        // Updated titles with "&" and proper capitalization
        const details = {
            unmet: { title: "Unmet Needs:", items: ["In genuine pain that is not being acknowledged", "Exhausted from poor sleep or chronic illness", "Hungry, cold or in an uncomfortable environment", "Feeling invisible or socially isolated", "Desperate for human connection as much as medical help"] },
            fear: { title: "Fear & Anxiety:", items: ["Fear of a serious diagnosis they are not ready to hear", "Anxiety about a procedure or treatment", "Fear of being dismissed or not taken seriously", "Worry about a loved one rather than themselves", "Health anxiety that has been building for weeks or months", "Fear of losing control over their own health decisions"] },
            life: { title: "Life Circumstances:", items: ["Caring for a sick relative while managing their own health", "Financial stress making every appointment feel high stakes", "Work pressure meaning this appointment has already cost them something", "Relationship breakdown or bereavement affecting their emotional resilience", "Mental health difficulties they have not disclosed"] },
            shame: { title: "Shame & Embarrassment:", items: ["Embarrassment about their symptoms or lifestyle", "Shame about leaving it too long before coming", "Feeling judged about weight, drinking or mental health", "Pride making it hard to ask for help", "Fear of being seen as a time waster"] },
            trauma: { title: "Past Traumatic Experiences:", items: ["Previous negative experience with the NHS or this practice", "History of being ignored or misdiagnosed", "Trauma associated with hospitals or medical settings", "Cultural or historical mistrust of authority or healthcare systems", "A loved one who was let down by the system"] },
            feelingUnheard: { title: "Feeling Unheard:", items: ["They have called multiple times and felt rushed or dismissed every time", "They have learned that raising their voice is the only way to be taken seriously", "Being passed between departments has destroyed any trust that someone will listen", "This frustration is rarely just about today. It is about every time before it"] },
            distress: { title: "Genuine Pain & Distress:", items: ["Pain changes people. It affects patience and the ability to communicate calmly", "What sounds like aggression is often exhaustion", "They are already using every resource they have just to be present in this conversation", "Chronic pain makes even small obstacles feel insurmountable"] },
            powerless: { title: "Feeling Powerless:", items: ["The healthcare system can feel vast and completely indifferent to the individual inside it", "Anger is often a response to powerlessness. It is the one thing they feel they can do", "They may have followed every process correctly and still ended up no further forward", "The reception desk can feel like the only place in the system where they have a voice"] }
        };

        const panel = document.getElementById('detailPanel');
        const heading = document.getElementById('panelHeading');
        const list = document.getElementById('panelList');
        const audio = document.getElementById('narrationAudio');

        function showData(key, side = 'right') {
            const data = details[key];
            if (!data) return;

            // Set panel position based on trigger side
            panel.classList.remove('on-left', 'on-right');
            panel.classList.add(side === 'left' ? 'on-left' : 'on-right');

            heading.innerText = data.title;
            list.innerHTML = data.items.map(item => `<li>${item}</li>`).join('');
            panel.classList.add('active');
        }
        function hideData() { panel.classList.remove('active'); }
        function toggleMute() { audio.muted = !audio.muted; document.getElementById('muteToggle').innerText = audio.muted ? 'Unmute Audio' : 'Mute Audio'; }
        function skipAudio() { audio.pause(); audio.currentTime = 0; document.body.classList.add('skip-delay'); }

        function startExperience() {
            document.getElementById('startOverlay').style.display = 'none';
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.warn("Audio play failed.", e));
            }
            document.body.classList.add('is-playing');
        }
    </script>
</body>
</html>
